<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Type-C 线价格差异封面图</title>
  <desc id="desc">一根 Type-C 线为什么能差出十倍价格的公众号封面图</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#e8f0f7"/>
    </linearGradient>
    <linearGradient id="cable" x1="0" x2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#4b5563"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#334155" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="980" cy="110" r="70" fill="#f59e0b" opacity="0.12"/>
  <circle cx="110" cy="560" r="96" fill="#0f766e" opacity="0.10"/>
  <text x="90" y="150" fill="#111827" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="56" font-weight="700">一根 Type-C 线</text>
  <text x="90" y="230" fill="#111827" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="56" font-weight="700">为什么能差出十倍价格？</text>
  <text x="94" y="290" fill="#475569" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28">接口一样，能力可能完全不同</text>
  <g filter="url(#shadow)">
    <path d="M250 468 C360 340, 470 340, 580 468 S800 596, 930 446" fill="none" stroke="url(#cable)" stroke-width="38" stroke-linecap="round"/>
    <g transform="translate(188 420)">
      <rect x="0" y="0" width="155" height="96" rx="24" fill="#111827"/>
      <rect x="18" y="20" width="108" height="56" rx="18" fill="#374151"/>
      <rect x="36" y="31" width="72" height="34" rx="14" fill="#9ca3af"/>
    </g>
    <g transform="translate(860 390) rotate(-10)">
      <rect x="0" y="0" width="170" height="106" rx="26" fill="#111827"/>
      <rect x="28" y="24" width="112" height="58" rx="20" fill="#374151"/>
      <rect x="50" y="36" width="68" height="34" rx="14" fill="#9ca3af"/>
    </g>
  </g>
  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="23" font-weight="700">
    <rect x="90" y="360" width="138" height="54" rx="12" fill="#0f766e"/>
    <text x="118" y="395" fill="#ffffff">充电功率</text>
    <rect x="248" y="360" width="138" height="54" rx="12" fill="#2563eb"/>
    <text x="276" y="395" fill="#ffffff">传输速度</text>
    <rect x="406" y="360" width="138" height="54" rx="12" fill="#7c3aed"/>
    <text x="434" y="395" fill="#ffffff">视频输出</text>
    <rect x="564" y="360" width="138" height="54" rx="12" fill="#d97706"/>
    <text x="592" y="395" fill="#ffffff">认证做工</text>
  </g>
  <text x="90" y="610" fill="#64748b" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="24">电脑周边知识普及</text>
</svg>
