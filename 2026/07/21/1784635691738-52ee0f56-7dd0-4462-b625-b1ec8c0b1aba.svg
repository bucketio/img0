<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Ansible Windows 自动化封面</title>
  <desc id="desc">Ansible 控制端通过 WinRM 管理多台 Windows 主机。</desc>
  <rect width="1200" height="675" fill="#f5f7fb"/>
  <rect x="92" y="74" width="1016" height="526" rx="34" fill="#ffffff" stroke="#d9deea" stroke-width="3"/>
  <text x="130" y="165" font-family="Arial, sans-serif" font-size="50" font-weight="700" fill="#182033">Ansible 是什么？</text>
  <text x="132" y="222" font-family="Arial, sans-serif" font-size="27" fill="#5f6b80">用一份 Playbook 批量管理 Windows 和服务器</text>
  <rect x="142" y="320" width="250" height="130" rx="24" fill="#202938"/>
  <text x="184" y="374" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Ansible 控制端</text>
  <text x="190" y="414" font-family="Arial, sans-serif" font-size="20" fill="#cbd5e1">Linux / macOS</text>
  <path d="M416 385 H526" stroke="#607089" stroke-width="5" stroke-dasharray="10 8" marker-end="url(#arrow)"/>
  <text x="436" y="352" font-family="Arial, sans-serif" font-size="21" fill="#5f6b80">WinRM / PSRP</text>
  <g font-family="Arial, sans-serif">
    <rect x="560" y="282" width="180" height="90" rx="18" fill="#edf5ff" stroke="#c9d7ef" stroke-width="3"/>
    <text x="607" y="338" font-size="24" font-weight="700" fill="#2f6bd9">Win01</text>
    <rect x="780" y="282" width="180" height="90" rx="18" fill="#edf5ff" stroke="#c9d7ef" stroke-width="3"/>
    <text x="827" y="338" font-size="24" font-weight="700" fill="#2f6bd9">Win02</text>
    <rect x="560" y="412" width="180" height="90" rx="18" fill="#e8f7ef" stroke="#b7e4c7" stroke-width="3"/>
    <text x="607" y="468" font-size="24" font-weight="700" fill="#24704d">Win03</text>
    <rect x="780" y="412" width="180" height="90" rx="18" fill="#e8f7ef" stroke="#b7e4c7" stroke-width="3"/>
    <text x="827" y="468" font-size="24" font-weight="700" fill="#24704d">Win04</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#607089"/>
    </marker>
  </defs>
</svg>
