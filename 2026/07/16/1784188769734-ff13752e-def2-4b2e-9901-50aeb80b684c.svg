<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" width="700" height="420">
  <defs>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1a6bff"/><stop offset="1" stop-color="#4a90d9"/></linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff6b35"/><stop offset="1" stop-color="#e85d2c"/></linearGradient>
  </defs>
  <rect width="700" height="420" fill="#f8f9fa" rx="8"/>
  <rect x="0" y="0" width="700" height="420" fill="none" stroke="#dee2e6" stroke-width="1" rx="8"/>
  
  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">行业规模六年翻倍，人均产值几乎原地踏步</text>
  
  <!-- Y-axis label -->
  <text x="20" y="220" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="11" fill="#666" transform="rotate(-90,20,220)">市场规模（亿元）</text>
  
  <!-- Chart area -->
  <g transform="translate(80, 60)">
    <!-- Grid lines -->
    <line x1="0" y1="0" x2="520" y2="0" stroke="#e0e0e0" stroke-width="0.5"/>
    <line x1="0" y1="55" x2="520" y2="55" stroke="#e0e0e0" stroke-width="0.5"/>
    <line x1="0" y1="110" x2="520" y2="110" stroke="#e0e0e0" stroke-width="0.5"/>
    <line x1="0" y1="165" x2="520" y2="165" stroke="#e0e0e0" stroke-width="0.5"/>
    <line x1="0" y1="220" x2="520" y2="220" stroke="#e0e0e0" stroke-width="0.5"/>
    <line x1="0" y1="275" x2="520" y2="275" stroke="#e0e0e0" stroke-width="0.5"/>
    
    <!-- Y-axis labels -->
    <text x="-10" y="4" text-anchor="end" font-family="sans-serif" font-size="10" fill="#999">8400</text>
    <text x="-10" y="59" text-anchor="end" font-family="sans-serif" font-size="10" fill="#999">7000</text>
    <text x="-10" y="114" text-anchor="end" font-family="sans-serif" font-size="10" fill="#999">5600</text>
    <text x="-10" y="169" text-anchor="end" font-family="sans-serif" font-size="10" fill="#999">4200</text>
    
    <!-- Bar group 2019 -->
    <rect x="25" y="195" width="50" height="80" fill="url(#bar1)" rx="3" opacity="0.9"/>
    <text x="50" y="288" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#2c3e50">2019</text>
    <text x="50" y="190" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a6bff" font-weight="bold">4,300</text>
    
    <!-- Bar group 2020 -->
    <rect x="95" y="170" width="50" height="105" fill="url(#bar1)" rx="3" opacity="0.9"/>
    <text x="120" y="288" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#2c3e50">2020</text>
    <text x="120" y="165" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a6bff" font-weight="bold">5,100</text>
    
    <!-- Bar group 2021 -->
    <rect x="165" y="140" width="50" height="135" fill="url(#bar1)" rx="3" opacity="0.9"/>
    <text x="190" y="288" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#2c3e50">2021</text>
    <text x="190" y="135" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a6bff" font-weight="bold">5,900</text>
    
    <!-- Bar group 2022 -->
    <rect x="235" y="115" width="50" height="160" fill="url(#bar1)" rx="3" opacity="0.9"/>
    <text x="260" y="288" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#2c3e50">2022</text>
    <text x="260" y="110" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a6bff" font-weight="bold">6,500</text>
    
    <!-- Bar group 2023 -->
    <rect x="305" y="90" width="50" height="185" fill="url(#bar1)" rx="3" opacity="0.9"/>
    <text x="330" y="288" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#2c3e50">2023</text>
    <text x="330" y="85" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a6bff" font-weight="bold">7,200</text>
    
    <!-- Bar group 2024 -->
    <rect x="375" y="65" width="50" height="210" fill="url(#bar1)" rx="3" opacity="0.9"/>
    <text x="400" y="288" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#2c3e50">2024</text>
    <text x="400" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a6bff" font-weight="bold">7,800</text>
    
    <!-- Bar group 2025E -->
    <rect x="445" y="40" width="50" height="235" fill="url(#bar1)" rx="3" opacity="0.9"/>
    <text x="470" y="288" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#2c3e50">2025E</text>
    <text x="470" y="35" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a6bff" font-weight="bold">8,400</text>
  </g>
  
  <!-- Annotation -->
  <text x="350" y="370" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#ff6b35" font-weight="bold">↑ 行业总收入翻倍</text>
  <text x="350" y="392" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#666">↔ 人均产值：52万→55-60万（几乎原地踏步）</text>
  
  <!-- Source -->
  <text x="690" y="412" text-anchor="end" font-family="sans-serif" font-size="9" fill="#aaa">数据来源：住建部历年统计公报</text>
</svg>
